<!doctype html><html lang='id'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Login Admin</title><link rel='stylesheet' href='styles.css'><script src='data-layer.js'></script></head><body><main class='container section' style='max-width:480px'><div class='card'><h2>Login Dashboard</h2><p class='muted'>Gunakan akun admin pengurus.</p><div id='msg' class='alert'></div><form id='f' class='grid'><input class='input' name='username' placeholder='Username' required><input class='input' type='password' name='password' placeholder='Password' required><button class='btn'>Masuk</button></form><p class='muted'>Default: admin_pengurus / pstiPengurus123</p></div></main><script>f.onsubmit=async(e)=>{e.preventDefault();const fd=new FormData(f);fd.append('action','login');const r=await fetch('auth_pengurus.php',{method:'POST',body:fd});const j=await r.json();if(!j.ok){msg.className='alert show err';msg.textContent=j.error||'Login gagal';return;}location.href=new URLSearchParams(location.search).get('next')||'dashboard.html';};</script></body></html>

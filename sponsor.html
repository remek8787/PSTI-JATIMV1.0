<!doctype html><html lang='id'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Sponsor - PSTI Jatim</title><link rel='stylesheet' href='styles.css'><script src='data-layer.js'></script><script defer src='app.js'></script></head><body><div id='navbar'></div><main class='container section'><h1>Mitra Sponsor</h1><div class='grid grid-4' id='sponsorList'></div></main><div id='footer'></div><script>document.addEventListener('DOMContentLoaded',async()=>{const j=await (await fetch('sponsor_api.php?action=list')).json();const w=document.getElementById('sponsorList');w.innerHTML=(j.items||[]).map(s=>`<article class='card'><img style='height:100px;object-fit:contain' src='${s.image||"assets/logo.png"}'><h3>${s.name||'Sponsor'}</h3><a href='${s.url||"#"}' target='_blank'>${s.url?'Kunjungi':'-'}</a></article>`).join('')||'<div class=card>Belum ada sponsor.</div>';});</script></body></html>

<!doctype html><html lang='id'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Klasemen - PSTI Jatim</title><link rel='stylesheet' href='styles.css'><script src='data-layer.js'></script><script defer src='app.js'></script></head><body><div id='navbar'></div><main class='container section'><h1>Klasemen Kompetisi</h1><div class='card'><table class='table'><thead><tr><th>#</th><th>Klub</th><th>Main</th><th>Menang</th><th>Poin</th></tr></thead><tbody id='klasemenBody'></tbody></table></div></main><div id='footer'></div><script>document.addEventListener('DOMContentLoaded',async()=>{const j=await (await fetch('klasemen_api.php?action=list')).json();const b=document.getElementById('klasemenBody');b.innerHTML=(j.items||[]).map((k,i)=>`<tr><td>${i+1}</td><td>${k.klub||'-'}</td><td>${k.main||0}</td><td>${k.menang||0}</td><td>${k.poin||0}</td></tr>`).join('');});</script></body></html>

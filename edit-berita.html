<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin Berita — PSTI Jatim</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white">
  <!-- Header -->
  <header class="bg-blue-600 shadow-md">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
      <a class="flex items-center gap-2" href="index.html">
        <img src="assets/logo.png" alt="Logo PSTI Jatim" class="w-9 h-9 rounded-full">
        <span class="font-bold">PSTI JATIM</span>
      </a>
      <div class="flex items-center gap-3">
        <span class="text-sm">Login sebagai: <strong id="who">-</strong></span>
        <a href="edit-klub.html" class="px-3 py-1 rounded bg-white text-blue-700 hover:bg-gray-200 text-sm">Admin Klub</a>
        <button id="btnLogout" class="px-3 py-1 rounded bg-white text-blue-700 hover:bg-gray-200 text-sm">Logout</button>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto p-4 sm:p-6">
    <h1 class="text-2xl font-extrabold mb-4">Admin Berita</h1>

    <!-- FORM -->
    <form id="f" class="bg-gray-800 rounded-lg p-4 sm:p-6 space-y-4" enctype="multipart/form-data">
      <input type="hidden" name="id" id="id">

      <div class="grid md:grid-cols-2 gap-4">
        <label class="block">Judul
          <input type="text" id="title" name="title" placeholder="Boleh kosong jika tarik dari URL"
                 class="mt-1 w-full rounded bg-gray-700 border border-gray-600 p-2">
        </label>
        <label class="block">Tanggal Terbit
          <input type="datetime-local" id="published_at" name="published_at"
                 class="mt-1 w-full rounded bg-gray-700 border border-gray-600 p-2">
        </label>
      </div>

      <div class="grid md:grid-cols-2 gap-4">
        <label class="block">URL Sumber (bebas: media/IG/FB/dll)
          <input type="url" id="source_url" name="source_url" placeholder="https://..."
                 class="mt-1 w-full rounded bg-gray-700 border border-gray-600 p-2">
        </label>
        <label class="block">Nama Sumber
          <input type="text" id="source_name" name="source_name" placeholder="mis. PSTI Jatim / MediaX"
                 class="mt-1 w-full rounded bg-gray-700 border border-gray-600 p-2">
        </label>
      </div>

      <label class="block">Ringkas Berita
        <textarea id="excerpt" name="excerpt" rows="3" placeholder="Ringkasan singkat"
                  class="mt-1 w-full rounded bg-gray-700 border border-gray-600 p-2"></textarea>
      </label>

      <div class="grid md:grid-cols-2 gap-4 items-center">
        <label class="block">Banner (opsional)
          <input type="file" id="banner" name="banner" accept=".jpg,.jpeg,.png,.webp"
                 class="mt-1 w-full rounded bg-gray-700 border border-gray-600 p-2">
        </label>
        <img id="preview" class="max-w-[180px] rounded-lg hidden" alt="">
      </div>

      <label class="inline-flex items-center gap-2">
        <input type="checkbox" id="pinned" name="pinned" value="1" class="size-4">
        <span>Tampilkan di urutan teratas (Pinned)</span>
      </label>

      <div class="flex flex-wrap gap-3 items-center">
        <button id="btnSave" type="submit" class="px-4 py-2 rounded bg-green-600 hover:bg-green-500">Simpan / Perbarui</button>
        <button id="btnReset" type="button" class="px-4 py-2 rounded bg-gray-600 hover:bg-gray-500">Reset Form</button>
        <span id="stat" class="text-sm"></span>
      </div>
    </form>

    <!-- FILTER + TABEL -->
    <section class="bg-gray-800 rounded-lg p-4 sm:p-6 mt-6">
      <h3 class="text-lg font-semibold mb-3">Daftar Berita</h3>

      <div class="grid md:grid-cols-2 gap-3 mb-4">
        <input id="q" placeholder="Cari judul/ringkas/sumber…" class="w-full rounded bg-gray-700 border border-gray-600 p-2">
        <select id="fpin" class="w-full rounded bg-gray-700 border border-gray-600 p-2">
          <option value="">Semua</option>
          <option value="1">Pinned saja</option>
          <option value="0">Non-pinned</option>
        </select>
      </div>

      <div class="overflow-x-auto">
        <table class="min-w-full text-sm">
          <thead class="bg-gray-700 text-left">
            <tr>
              <th class="p-2">Banner</th>
              <th class="p-2">Judul</th>
              <th class="p-2">Sumber</th>
              <th class="p-2">Terbit</th>
              <th class="p-2">Pinned</th>
              <th class="p-2">Aksi</th>
            </tr>
          </thead>
          <tbody id="tbl" class="divide-y divide-gray-700"></tbody>
        </table>
      </div>
    </section>
  </main>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const API  = 'berita_api.php';
  const AUTH = 'auth_pengurus.php';
  const $ = id => document.getElementById(id);
  const stat = $('stat'), tbl = $('tbl'), preview = $('preview');

  const info=t=>{ stat.classList.remove('text-red-300'); stat.classList.add('text-emerald-300'); stat.textContent=t; };
  const error=t=>{ stat.classList.remove('text-emerald-300'); stat.classList.add('text-red-300'); stat.textContent=t; };

  (async()=>{
    try{
      const r = await fetch(AUTH+'?action=me',{credentials:'same-origin'});
      const j = await r.json();
      if(!j.admin){ location.href = 'login_pengurus.html?next='+encodeURIComponent('edit-berita.html'); return; }
      $('who').textContent = j.user || 'Pengurus';
      loadList();
    }catch(e){
      // kalau AUTH tidak tersedia, masih bisa pakai tanpa guard
      loadList();
    }
  })();

  $('btnLogout').addEventListener('click', async ()=>{
    try{ await fetch(AUTH+'?action=logout',{credentials:'same-origin'}); }catch(e){}
    location.href='login_pengurus.html?next='+encodeURIComponent('edit-berita.html');
  });

  function fmt(s){
    if(!s) return '-';
    try{ return new Date(s.replace(' ','T')).toLocaleString('id-ID',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}); }
    catch(_){ return s; }
  }

  async function loadList(){
    let url = API+'?action=list';
    const q = $('q').value.trim(), pin = $('fpin').value;
    if(q) url += '&search='+encodeURIComponent(q);
    if(pin!=='') url += '&pinned='+encodeURIComponent(pin);

    try{
      const r = await fetch(url);
      const text = await r.text();
      let j; try{ j = JSON.parse(text); }catch(_){ throw new Error('Jawaban bukan JSON:\n'+text.slice(0,200)); }
      if(!j.ok) throw new Error(j.error||'Gagal memuat');
      tbl.innerHTML='';
      (j.items||[]).forEach(it=>{
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td class="p-2">${it.banner? `<img src="${it.banner}" class="w-16 h-12 object-cover rounded">` : '-'}</td>
          <td class="p-2">
            <div class="font-semibold">${it.title||'(Tanpa judul)'}</div>
            <div class="text-gray-300 line-clamp-2 max-w-[42ch]">${it.excerpt||''}</div>
          </td>
          <td class="p-2">
            <div>${it.source_name||''}</div>
            <div class="text-gray-300 truncate max-w-[32ch]">${it.source_url||''}</div>
          </td>
          <td class="p-2">${fmt(it.published_at)}</td>
          <td class="p-2">${it.pinned? '✔':''}</td>
          <td class="p-2 space-x-2">
            <button class="px-2 py-1 rounded bg-blue-600 hover:bg-blue-500" data-act="edit" data-id="${it.id}">Edit</button>
            <button class="px-2 py-1 rounded bg-red-600 hover:bg-red-500" data-act="del" data-id="${it.id}">Hapus</button>
          </td>`;
        tbl.appendChild(tr);
      });
      if(!tbl.children.length){
        const tr=document.createElement('tr');
        tr.innerHTML='<td class="p-2 text-gray-300" colspan="6">Belum ada berita.</td>';
        tbl.appendChild(tr);
      }
      info(''); // clear
    }catch(e){ error('Gagal memuat list: '+e.message); }
  }

  // Submit
  $('f').addEventListener('submit', async (ev)=>{
    ev.preventDefault();
    const fd = new FormData(ev.target);
    const p = $('published_at').value; if(p) fd.set('published_at', p.replace('T',' '));
    fd.append('action', $('id').value ? 'update' : 'create');
    try{
      $('btnSave').disabled=true; info('Menyimpan...');
      const r = await fetch(API,{method:'POST',body:fd});
      const text = await r.text(); let j; try{ j=JSON.parse(text); }catch(_){ throw new Error('Jawaban bukan JSON:\n'+text.slice(0,200)); }
      if(!r.ok || !j.ok) throw new Error(j.error||('HTTP '+r.status));
      info('Tersimpan ✔'); ev.target.reset(); $('id').value=''; preview.classList.add('hidden'); loadList();
    }catch(err){ error(err.message); }
    finally{ $('btnSave').disabled=false; }
  });

  $('btnReset').addEventListener('click', ()=>{
    const f=$('f'); f.reset(); $('id').value=''; stat.textContent=''; preview.classList.add('hidden');
  });

  document.addEventListener('click', async (e)=>{
    const btn = e.target.closest('button'); if(!btn) return;
    const id  = btn.dataset.id;
    if(btn.dataset.act==='edit'){
      const r = await fetch(API+'?action=get&id='+encodeURIComponent(id));
      const j = await r.json();
      if(!j.ok) return error(j.error||'Tidak ditemukan');
      const it=j.item;
      ['id','title','excerpt','source_url','source_name'].forEach(k=>{ const el=$(k); if(el) el.value=it[k]||''; });
      $('published_at').value = (it.published_at||'').replace(' ','T');
      $('pinned').checked = !!it.pinned;
      if(it.banner){ preview.src=it.banner; preview.classList.remove('hidden'); } else { preview.classList.add('hidden'); }
      window.scrollTo({top:0,behavior:'smooth'});
    }
    if(btn.dataset.act==='del'){
      if(!confirm('Hapus berita ini?')) return;
      const fd = new FormData(); fd.append('action','delete'); fd.append('id',id);
      const r  = await fetch(API,{method:'POST',body:fd});
      const t  = await r.text(); let j; try{ j=JSON.parse(t); }catch(_){ return error('Jawaban bukan JSON:\n'+t.slice(0,200)); }
      if(!r.ok || !j.ok) return error(j.error||('HTTP '+r.status));
      info('Terhapus ✔'); loadList();
    }
  });

  $('banner').addEventListener('change', e=>{
    const file = e.target.files[0];
    if(file){ preview.src = URL.createObjectURL(file); preview.classList.remove('hidden'); }
    else preview.classList.add('hidden');
  });

  $('q').addEventListener('input', loadList);
  $('fpin').addEventListener('change', loadList);
});
</script>
</body>
</html>

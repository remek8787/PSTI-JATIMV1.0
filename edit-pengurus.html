<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin Pengurus — PSTI Jatim</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white">
  <!-- Header -->
  <header class="bg-blue-600 shadow-md">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
      <a class="flex items-center gap-2" href="index.html">
        <img src="assets/logo.png" alt="Logo PSTI Jatim" class="w-10 h-10 rounded-full">
        <span class="font-bold text-lg">PSTI JATIM</span>
      </a>
      <div class="flex items-center gap-4">
        <span class="text-sm">Login sebagai: <strong id="who">-</strong></span>
        <button id="btnLogout" type="button" class="px-3 py-1 rounded bg-white text-blue-700 hover:bg-gray-200 transition">Logout</button>
      </div>
    </div>
  </header>

  <main class="max-w-5xl mx-auto p-6">
    <h1 class="text-2xl font-bold mb-4">Admin Pengurus</h1>

    <!-- FORM -->
    <form id="f" class="bg-gray-800 p-6 rounded-lg space-y-4" enctype="multipart/form-data">
      <input type="hidden" name="id" id="id">

      <div class="grid md:grid-cols-2 gap-4">
        <label class="block">Nama <span class="text-red-400">*</span>
          <input type="text" name="nama" id="nama" required class="mt-1 w-full p-2 rounded bg-gray-700 border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </label>
        <label class="block">No. Telepon
          <input type="text" name="telepon" id="telepon" class="mt-1 w-full p-2 rounded bg-gray-700 border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </label>
      </div>

      <div class="grid md:grid-cols-2 gap-4">
        <label class="block">Alamat
          <input type="text" name="alamat" id="alamat" class="mt-1 w-full p-2 rounded bg-gray-700 border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </label>
        <!-- License dihapus -->
      </div>

      <label class="block">Jabatan
        <input type="text" name="jabatan" id="jabatan" placeholder="Ketua Umum, Sekretaris, Bendahara, dsb." class="mt-1 w-full p-2 rounded bg-gray-700 border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </label>

      <!-- ==== Tambahan field kategori & urutan ==== -->
      <div class="grid md:grid-cols-3 gap-4">
        <label class="block">Kategori
          <input type="text" name="kategori" id="kategori" placeholder="mis. Pelindung / Pembina / Pengurus Harian" class="mt-1 w-full p-2 rounded bg-gray-700 border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </label>
        <label class="block">Urutan Kategori
          <input type="number" name="kat_order" id="kat_order" min="1" value="99" class="mt-1 w-full p-2 rounded bg-gray-700 border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </label>
        <label class="block">Urut (dalam kategori)
          <input type="number" name="urut" id="urut" min="1" value="99" class="mt-1 w-full p-2 rounded bg-gray-700 border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </label>
      </div>
      <!-- ==== /tambahan ==== -->

      <!-- Biografi (name='biografi') -->
      <label class="block">Biografi
        <textarea name="biografi" id="biografi" rows="4" placeholder="Tulis biografi singkat pengurus" class="mt-1 w-full p-2 rounded bg-gray-700 border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
      </label>

      <label class="block">Riwayat Pendidikan
        <textarea name="pendidikan" id="pendidikan" rows="3" class="mt-1 w-full p-2 rounded bg-gray-700 border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
      </label>

      <label class="block">Sertifikat
        <textarea name="sertifikat" id="sertifikat" rows="3" placeholder="mis. Wasit Level-1 (2023)" class="mt-1 w-full p-2 rounded bg-gray-700 border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
      </label>

      <div class="grid md:grid-cols-2 gap-4 items-center">
        <label class="block">Foto (opsional)
          <input type="file" name="foto" id="foto" accept=".jpg,.jpeg,.png,.webp" class="mt-1 w-full p-2 rounded bg-gray-700 border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </label>
        <div class="flex items-center">
          <img id="preview" src="" alt="" class="max-w-[160px] rounded-lg hidden">
        </div>
      </div>

      <div class="flex gap-3">
        <button class="px-4 py-2 bg-green-600 rounded hover:bg-green-500 disabled:opacity-50 disabled:cursor-not-allowed transition" type="submit" id="btnSave">Simpan / Perbarui</button>
        <button class="px-4 py-2 bg-gray-600 rounded hover:bg-gray-500 transition" type="button" id="btnReset">Reset Form</button>
      </div>
      <div id="stat" class="text-sm mt-2"></div>
    </form>

    <!-- TABEL -->
    <div class="bg-gray-800 p-6 rounded-lg mt-6">
      <div class="flex items-center justify-between mb-3">
        <h3 class="font-semibold text-lg">Daftar Pengurus</h3>
      </div>
      <div class="overflow-x-auto">
        <table class="min-w-full text-left text-sm" id="tbl">
          <thead class="bg-gray-700 text-gray-100">
            <tr>
              <th class="p-2">Foto</th>
              <th class="p-2">Nama</th>
              <th class="p-2">Telepon</th>
              <th class="p-2 w-[240px]">Aksi</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-gray-700"></tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- JS -->
  <script>
  document.addEventListener('DOMContentLoaded', () => {
    const API = 'pengurus_api.php';
    const $ = id => document.getElementById(id);
    const f = $('f'), stat = $('stat'), preview = $('preview');

    const info  = t => { stat.style.color = '#9be598'; stat.textContent = t; };
    const error = t => { stat.style.color = '#ffb3b3'; stat.textContent = t; };

    // Cek sesi: prioritaskan auth_pengurus, fallback ke auth_api
    async function guard(){
      async function check(url){
        try{
          const res = await fetch(url, {credentials:'same-origin'});
          if (!res.ok) return null;
          const j = await res.json().catch(()=>null);
          return j && j.ok && j.admin ? j : null;
        }catch(_){ return null; }
      }
      let me = await check('auth_pengurus.php?action=me');
      if (!me) me = await check('auth_api.php?action=me');

      if (!me){
        const next = encodeURIComponent('edit-pengurus.html');
        try{
          const ping = await fetch('auth_pengurus.php?action=me', {method:'GET'});
          location.href = (ping.ok ? 'login_pengurus.html?next=' : 'login.html?next=') + next;
        }catch(e){
          location.href = 'login.html?next=' + next;
        }
        return false;
      }
      $('who').textContent = me.user || 'admin';
      return true;
    }

    function renderRow(it){
      const tr = document.createElement('tr');
      tr.className = "hover:bg-gray-700/40";
      tr.innerHTML = `
        <td class="p-2 align-middle">${it.foto? `<img src="${it.foto}" class="w-12 h-12 object-cover rounded">` : '-'}</td>
        <td class="p-2 align-middle">
          <div class="font-semibold">${it.nama||''}</div>
          <div class="text-gray-400 text-xs">
            ${it.kategori ? it.kategori + ' • ' : ''}${it.jabatan||''}${it.alamat ? ' — ' + it.alamat : ''}
          </div>
        </td>
        <td class="p-2 align-middle">${it.telepon||''}</td>
        <td class="p-2 align-middle">
          <div class="flex flex-wrap gap-2">
            <button class="px-2 py-1 bg-blue-600 hover:bg-blue-500 rounded text-white" data-act="edit" data-id="${it.id}">Edit</button>
            <button class="px-2 py-1 bg-red-600 hover:bg-red-500 rounded text-white" data-act="del" data-id="${it.id}">Hapus</button>
            <a class="px-2 py-1 bg-gray-600 hover:bg-gray-500 rounded text-white" href="pengurus-detail.html?id=${it.id}" target="_blank" rel="noopener">View</a>
          </div>
        </td>`;
      return tr;
    }

    function loadList(){
      fetch(API+'?action=list', {credentials:'same-origin'}).then(r=>r.json()).then(j=>{
        const tb = document.querySelector('#tbl tbody'); tb.innerHTML='';
        (j.items||[]).forEach(it=> tb.appendChild(renderRow(it)));
        if(!j.items || !j.items.length){
          const tr = document.createElement('tr');
          tr.innerHTML = `<td colspan="4" class="p-3 text-gray-400">Belum ada data.</td>`;
          tb.appendChild(tr);
        }
      }).catch(e=> error('Gagal memuat list: '+e.message));
    }

    f.addEventListener('submit', async (e)=>{
      e.preventDefault();
      const fd = new FormData(f);
      fd.append('action', $('id').value ? 'update' : 'create');
      try{
        $('btnSave').disabled = true; info('Menyimpan...');
        const res  = await fetch(API, { method:'POST', body: fd, credentials:'same-origin' });
        const text = await res.text();
        let j; try { j = JSON.parse(text); }
        catch { throw new Error((text||'').slice(0,260) || 'Response bukan JSON'); }
        if(!res.ok || !j.ok) throw new Error(j.error || ('HTTP '+res.status));
        info('Tersimpan ✔');
        f.reset(); $('id').value=''; $('kat_order').value='99'; $('urut').value='99';
        preview.classList.add('hidden'); stat.classList.remove('text-red-400');
        loadList();
      }catch(err){ error(err.message); }
      finally{ $('btnSave').disabled = false; }
    });

    $('btnReset').addEventListener('click', ()=>{
      f.reset(); $('id').value=''; $('kat_order').value='99'; $('urut').value='99';
      preview.classList.add('hidden'); stat.textContent='';
    });

    document.querySelector('#tbl').addEventListener('click', async (e)=>{
      const btn = e.target.closest('button'); if(!btn) return;
      const id  = btn.dataset.id;
      if (btn.dataset.act==='edit'){
        const res = await fetch(API+'?action=get&id='+encodeURIComponent(id), {credentials:'same-origin'});
        const j = await res.json();
        if(!j.ok) return error('Tidak ditemukan');
        const it = j.item;
        // isi form; biografi dari it.biografi (fallback it.pengalaman untuk data lama jika masih ada)
        $('id').value = it.id || '';
        $('nama').value = it.nama || '';
        $('telepon').value = it.telepon || '';
        $('alamat').value = it.alamat || '';
        $('jabatan').value = it.jabatan || '';
        $('kategori').value = it.kategori || '';
        $('kat_order').value = (it.kat_order ?? 99);
        $('urut').value = (it.urut ?? 99);
        $('biografi').value = (it.biografi || it.pengalaman || '');
        $('pendidikan').value = it.pendidikan || '';
        $('sertifikat').value = it.sertifikat || '';
        if (it.foto){ preview.src = it.foto; preview.classList.remove('hidden'); } else preview.classList.add('hidden');
        window.scrollTo({top:0,behavior:'smooth'});
      }
      if (btn.dataset.act==='del'){
        if(!confirm('Hapus data ini?')) return;
        const fd = new FormData(); fd.append('action','delete'); fd.append('id',id);
        const res = await fetch(API, {method:'POST', body:fd, credentials:'same-origin'});
        const text = await res.text();
        let j; try { j = JSON.parse(text); } catch { return error((text||'').slice(0,260)); }
        if(!res.ok || !j.ok) return error(j.error||('HTTP '+res.status));
        loadList(); info('Terhapus ✔');
      }
    });

    $('foto').addEventListener('change', e=>{
      const file = e.target.files[0];
      if(file){ preview.src = URL.createObjectURL(file); preview.classList.remove('hidden'); }
      else { preview.classList.add('hidden'); }
    });

    $('btnLogout').addEventListener('click', async ()=>{
      try{ await fetch('auth_pengurus.php?action=logout', {credentials:'same-origin'}); }catch(_){}
      try{ await fetch('auth_api.php?action=logout', {credentials:'same-origin'}); }catch(_){}
      try{
        const ping = await fetch('auth_pengurus.php?action=me', {method:'GET'});
        location.href = ping.ok ? 'login_pengurus.html' : 'login.html';
      }catch(_){ location.href='login.html'; }
    });

    guard().then(ok => { if(ok) loadList(); });
  });
  </script>
</body>
</html>

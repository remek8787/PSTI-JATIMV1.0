<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Detail Atlet — PSTI Jatim</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white">

  <!-- Header -->
  <header class="bg-blue-500 py-3 shadow">
    <div class="container mx-auto flex items-center justify-between px-4">
      <a href="index.html" class="flex items-center gap-2">
        <img src="assets/logo.jpeg" alt="Logo PSTI Jatim" class="w-10 h-10 rounded">
        <span class="font-bold">PSTI JATIM</span>
      </a>
      <button onclick="history.back()" class="bg-white text-gray-900 px-3 py-1 rounded hover:bg-gray-200">
        ← Kembali
      </button>
    </div>
  </header>

  <!-- Konten -->
  <main class="container mx-auto px-4 py-6">
    <div id="detail" class="bg-gray-800 p-6 rounded-lg shadow-lg flex flex-col md:flex-row gap-6">
      <img id="foto" src="" alt="Foto Atlet"
        class="w-full md:w-64 h-64 object-cover object-center rounded-lg shadow-md">

      <div class="flex-1">
        <h2 id="nama" class="text-2xl font-bold mb-2">Nama Atlet</h2>
        <p id="jk" class="mb-1"></p>
        <p id="ttl" class="mb-1"></p>
        <p id="sejarah" class="mb-3"></p>

        <div id="pencapaian" class="mb-4">
          <h3 class="font-semibold text-lg">Pencapaian</h3>
          <ul class="list-disc list-inside text-gray-300"></ul>
        </div>
      </div>
    </div>
  </main>

<script>
document.addEventListener('DOMContentLoaded', async () => {
  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  if (!id) return;

  try {
    const res = await fetch('atlit_api.php?action=get&id=' + encodeURIComponent(id));
    const j = await res.json();
    if (!j.ok) throw new Error(j.error || 'Gagal memuat data');
    const it = j.item;

    document.getElementById('foto').src = it.foto || 'assets/no-photo.png';
    document.getElementById('nama').textContent = it.nama || '';
    document.getElementById('jk').textContent = `Jenis Kelamin: ${it.jk || '-'}`;
    document.getElementById('ttl').textContent = `Tempat, Tanggal Lahir: ${it.tempat_lahir || '-'}, ${it.tgl_lahir || '-'}`;
    document.getElementById('sejarah').textContent = it.sejarah_singkat || '';

    // Render pencapaian
    const pencapaianList = document.querySelector('#pencapaian ul');
    if (it.medali && it.jumlah) {
      it.medali.forEach((m, i) => {
        if (!m) return;
        const icon = m === 'emas' ? '🥇' : m === 'perak' ? '🥈' : '🥉';
        const li = document.createElement('li');
        li.innerHTML = `${icon} ${it.jumlah[i] || ''} — ${it.event[i] || ''} (${it.tahun[i] || ''})`;
        pencapaianList.appendChild(li);
      });
    }

  } catch (err) {
    alert(err.message);
  }
});
</script>
</body>
</html>

<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Berita — PSTI Jatim</title>
  <link rel="stylesheet" href="styles.css">
  <script defer>
    async function run(){
      const params = new URLSearchParams(location.search);
      const id = Number(params.get("id")||"1");
      const res = await fetch("data/berita.json");
      const list = await res.json();
      const b = list.find(x=>x.id===id) || list[0];
      document.getElementById("judul").textContent = b.judul;
      document.getElementById("meta").textContent = `${b.tanggal} · ${b.kategori}`;
      document.getElementById("gambar").src = b.gambar;
      document.getElementById("isi").innerHTML =
        `<p>Lorem ipsum: ini contoh isi berita untuk <strong>${b.judul}</strong>. Ganti dengan konten asli.</p>`;
    }
    addEventListener("DOMContentLoaded", run);
  </script>
</head>
<body>
  <header class="header"><div class="container"><a class="brand" href="index.html">← PSTI JATIM</a></div></header>
  <main class="container" style="margin:22px auto;max-width:820px">
    <h1 id="judul">Judul</h1>
    <div class="muted" id="meta">Tanggal</div>
    <img id="gambar" alt="" style="width:100%;border-radius:12px;margin:14px 0">
    <article class="card" id="isi">Memuat...</article>
  </main>
  <footer class="footer"><div class="copy">© <script>document.write(new Date().getFullYear())</script> PSTI Jatim</div></footer>
</body>
</html>

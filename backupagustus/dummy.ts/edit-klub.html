<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin Klub — PSTI Jatim</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Header mini -->
  <header class="header overlay">
    <div class="container" style="display:flex;align-items:center;gap:12px">
      <a class="brand" href="index.html">
        <img src="assets/logo.jpeg" alt="Logo PSTI Jatim"><span>PSTI JATIM</span>
      </a>
      <div style="margin-left:auto;display:flex;align-items:center;gap:10px">
        <span class="muted">Login sebagai: <strong id="who">-</strong></span>
        <a class="btn btn-small" href="pengurus.html">Pengurus</a>
        <button class="btn btn-small btn-ghost" id="btnLogout" type="button">Logout</button>
      </div>
    </div>
  </header>

  <main class="container" style="max-width:980px;margin:22px auto">
    <h1 style="margin:12px 0">Admin Klub</h1>

    <!-- FORM -->
    <form id="f" class="card" enctype="multipart/form-data" style="margin-bottom:18px">
      <input type="hidden" name="id" id="id">
      <div class="grid2" style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <label>Nama Klub <span class="req">*</span>
          <input type="text" name="nama" id="nama" required>
        </label>
        <label>Asal Kota / Kabupaten
          <input type="text" name="kota" id="kota" placeholder="mis. Malang">
        </label>
      </div>
      <div class="grid2" style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <label>Pemilik Klub
          <input type="text" name="pemilik" id="pemilik" placeholder="mis. Malang01">
        </label>
        <label>Kontak Person
          <input type="text" name="kontak" id="kontak" placeholder="+62…">
        </label>
      </div>
      <div class="grid2" style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <label>Instagram (opsional)
          <input type="text" name="ig" id="ig" placeholder="@akun.ig atau url">
        </label>
        <label>Logo (opsional)
          <input type="file" name="logo" id="logo" accept=".jpg,.jpeg,.png,.webp">
        </label>
      </div>

      <div style="margin-top:8px">
        <img id="preview" src="" alt="" style="max-width:160px;border-radius:10px;display:none">
      </div>

      <div class="cta-group" style="margin-top:12px;display:flex;gap:10px">
        <button class="btn" type="submit" id="btnSave">Simpan / Perbarui</button>
        <button class="btn btn-ghost" type="button" id="btnReset">Reset Form</button>
        <span id="stat" class="muted" style="margin-left:6px"></span>
      </div>
    </form>

    <!-- Pencarian -->
    <div class="card" style="margin-bottom:10px">
      <input id="q" placeholder="Cari nama/kota/pemilik/IG…" style="width:100%;padding:10px;border-radius:8px;border:1px solid #ffffff22;background:#0f2536;color:#e9f5ff">
    </div>

    <!-- TABEL -->
    <div class="card">
      <h3 style="margin:0 0 8px">Daftar Klub</h3>
      <div class="table-wrap" style="overflow:auto">
        <table class="table" id="tbl">
          <thead>
            <tr>
              <th>Logo</th><th>Nama Klub</th><th>Kota/Kab</th>
              <th>Pemilik</th><th>Kontak</th><th>IG</th><th style="width:220px">Aksi</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </main>

  <script>
  document.addEventListener('DOMContentLoaded', () => {
    const API  = 'klub_api.php';
    const AUTH = 'auth_pengurus.php';
    const $ = id => document.getElementById(id);

    const f = $('f');
    const stat = $('stat');
    const tbl = document.querySelector('#tbl tbody');
    const preview = $('preview');
    const search = $('q');

    const info  = t => { if(stat){ stat.style.color='#9be598'; stat.textContent=t; } };
    const error = t => { if(stat){ stat.style.color='#ffb3b3'; stat.textContent=t; } };

    // ===== Guard (wajib login) =====
    (async () => {
      try{
        const r = await fetch(AUTH+'?action=me', {credentials:'same-origin'});
        const j = await r.json();
        if (!j.admin) {
          location.href = 'login_pengurus.html?next=' + encodeURIComponent('edit-klub.html');
          return;
        }
        ($('who')||{}).textContent = j.user || 'Pengurus';
        loadList();
      }catch(e){ error('Gagal cek sesi: '+e.message); }
    })();

    // ===== Logout =====
    $('btnLogout').addEventListener('click', async ()=>{
      try{ await fetch(AUTH+'?action=logout', {credentials:'same-origin'}); }catch(e){}
      location.href='edit-klub.html';
    });

    // ===== Load daftar klub =====
    async function loadList(){
      try{
        const r = await fetch(API+'?action=list');
        const j = await r.json();
        if (!j.ok) throw new Error(j.error || 'Gagal memuat');
        const items = j.items || [];
        tbl.innerHTML = '';
        items.forEach(it=>{
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${it.logo? `<img src="${it.logo}" style="width:44px;height:44px;object-fit:cover;border-radius:8px">` : '-'}</td>
            <td><strong>${it.nama||''}</strong></td>
            <td>${it.kota||''}</td>
            <td>${it.pemilik||''}</td>
            <td>${it.kontak||''}</td>
            <td>${it.ig||''}</td>
            <td>
              <button class="btn btn-small" data-act="edit" data-id="${it.id}">Edit</button>
              <button class="btn btn-small btn-ghost" data-act="del" data-id="${it.id}">Hapus</button>
            </td>`;
          tbl.appendChild(tr);
        });
      }catch(e){ error('Gagal memuat list: '+e.message); }
    }

    // ===== Submit form via fetch (prevent default) =====
    f.addEventListener('submit', async (e)=>{
      e.preventDefault();
      const fd = new FormData(f);
      fd.append('action', $('id').value ? 'update' : 'create');

      try{
        $('btnSave').disabled = true;
        info('Menyimpan...');
        const r = await fetch(API, { method:'POST', body: fd });
        const txt = await r.text();
        let j; try{ j = JSON.parse(txt); } catch { throw new Error((txt||'').slice(0,260) || 'Response bukan JSON'); }
        if (!r.ok || !j.ok) throw new Error(j.error || ('HTTP '+r.status));

        info('Tersimpan ✔');
        f.reset(); $('id').value=''; if(preview){ preview.style.display='none'; preview.src=''; }
        loadList();
      }catch(err){ error(err.message); }
      finally{ $('btnSave').disabled = false; }
    });

    // ===== Reset form =====
    $('btnReset').addEventListener('click', ()=>{
      f.reset(); $('id').value=''; stat.textContent='';
      if(preview){ preview.style.display='none'; preview.src=''; }
    });

    // ===== Edit / Hapus dari tabel =====
    document.getElementById('tbl').addEventListener('click', async (e)=>{
      const btn = e.target.closest('button'); if(!btn) return;
      const id  = btn.dataset.id;

      if (btn.dataset.act === 'edit'){
        const r = await fetch(API+'?action=get&id='+encodeURIComponent(id));
        const j = await r.json();
        if (!j.ok) return error(j.error||'Tidak ditemukan');
        const it = j.item;

        ['id','nama','kota','pemilik','kontak','ig'].forEach(k => { const el=$(k); if(el) el.value = it[k] || ''; });
        if (preview){
          if (it.logo){ preview.src = it.logo; preview.style.display='block'; }
          else { preview.style.display='none'; preview.src=''; }
        }
        window.scrollTo({top:0,behavior:'smooth'});
      }

      if (btn.dataset.act === 'del'){
        if (!confirm('Hapus data ini?')) return;
        const fd = new FormData(); fd.append('action','delete'); fd.append('id',id);
        const r = await fetch(API, { method:'POST', body: fd });
        const txt = await r.text();
        let j; try{ j=JSON.parse(txt); }catch{ return error((txt||'').slice(0,260)); }
        if (!r.ok || !j.ok) return error(j.error||('HTTP '+r.status));
        info('Terhapus ✔'); loadList();
      }
    });

    // ===== Preview logo =====
    $('logo').addEventListener('change', (e)=>{
      const file = e.target.files[0];
      if (file){ preview.src = URL.createObjectURL(file); preview.style.display='block'; }
      else { preview.style.display='none'; preview.src=''; }
    });

    // ===== Pencarian =====
    if (search){
      search.addEventListener('input', ()=>{
        const q = search.value.toLowerCase();
        tbl.querySelectorAll('tr').forEach(tr=>{
          const t = tr.textContent.toLowerCase();
          tr.style.display = t.includes(q) ? '' : 'none';
        });
      });
    }
  });
  </script>
</body>
</html>

<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Detail Pengurus — PSTI Jatim</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .detail-card{background:var(--card);border:1px solid #ffffff14;border-radius:14px;padding:18px}
    .detail-grid{display:grid;grid-template-columns:280px 1fr;gap:24px}
    .detail-photo{width:100%;height:220px;object-fit:cover;border-radius:14px;background:#0b2030}
    .h2{font-weight:800;font-size:1.4rem;margin:0 0 6px}
    .key{color:var(--muted);font-size:.95rem}
    .dotlist{margin:6px 0 14px;padding-left:18px}
    .dotlist li{margin:4px 0}
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header overlay">
    <div class="container" style="display:flex;align-items:center;gap:12px">
      <a class="brand" href="index.html">
        <img src="assets/logo.jpeg" alt="Logo PSTI Jatim">
        <span>PSTI JATIM</span>
      </a>
    </div>
  </header>

  <main class="container" style="max-width:1100px;margin:22px auto">
    <!-- Tombol kembali -->
    <div style="margin:8px 0 14px">
      <button id="btnBack" class="btn btn-small btn-ghost" type="button">← Kembali</button>
    </div>

    <div class="detail-card">
      <div class="detail-grid">
        <img id="foto" class="detail-photo" alt="">
        <div>
          <div class="h2" id="nama">-</div>
          <div id="license" class="key"></div>
          <div id="telepon" class="key"></div>
          <div id="alamat" class="key" style="margin-bottom:10px"></div>

          <div class="h2" style="font-size:1.1rem;margin-top:12px">Pengalaman</div>
          <ul id="pengalaman" class="dotlist"></ul>

          <div class="h2" style="font-size:1.1rem;margin-top:12px">Riwayat Pendidikan</div>
          <ul id="pendidikan" class="dotlist"></ul>

          <div class="h2" style="font-size:1.1rem;margin-top:12px">Sertifikat</div>
          <ul id="sertifikat" class="dotlist"></ul>
        </div>
      </div>
    </div>

    <div id="msg" class="muted" style="margin-top:10px"></div>
  </main>

  <script>
  (function(){
    const $ = id => document.getElementById(id);
    const msg = $('msg');

    // tombol kembali
    $('btnBack').addEventListener('click', ()=>{
      // kalau ada riwayat dan asal masih 1 origin, balik; kalau tidak, ke pengurus.html
      try{
        if (document.referrer && new URL(document.referrer).origin === location.origin) {
          history.back();
        } else {
          location.href = 'pengurus.html';
        }
      }catch(_){ location.href = 'pengurus.html'; }
    });

    const params = new URLSearchParams(location.search);
    const id = params.get('id') || '';

    const API = (location.protocol === 'file:')
      ? 'http://localhost/psti-jatim/pengurus_api.php'
      : 'pengurus_api.php';

    function listToUl(el, text){
      el.innerHTML = '';
      const lines = (text || '').split(/\r?\n/).map(s => s.trim()).filter(Boolean);
      if (!lines.length){ el.innerHTML = '<li class="key">-</li>'; return; }
      lines.forEach(s => {
        const li = document.createElement('li');
        li.textContent = s;
        el.appendChild(li);
      });
    }

    fetch(API+'?action=get&id='+encodeURIComponent(id))
      .then(r => r.json())
      .then(j => {
        if (!j.ok) throw new Error(j.error || 'Data tidak ditemukan');
        const it = j.item;

        $('nama').textContent = it.nama || '-';
        $('license').textContent = (it.jabatan ? (it.jabatan + ' • ') : '') + (it.license || '');
        $('telepon').innerHTML = it.telepon ? ('📞 ' + it.telepon) : '';
        $('alamat').textContent = it.alamat || '';

        $('foto').src = it.foto || 'assets/contoh.jpg';
        $('foto').alt = it.nama || 'Foto';

        listToUl($('pengalaman'), it.pengalaman);
        listToUl($('pendidikan'), it.pendidikan);
        listToUl($('sertifikat'),  it.sertifikat);
      })
      .catch(err => {
        console.error(err);
        msg.style.color = '#ffb3b3';
        msg.textContent = 'Gagal memuat detail: ' + err.message;
      });
  })();
  </script>
</body>
</html>

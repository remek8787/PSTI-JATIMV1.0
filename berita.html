<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Berita — PSTI Jatim</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* ==== Kartu Berita ==== */
    .news-card {
      background: var(--card, #0f2536);
      border: 1px solid #ffffff14;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column; /* gambar di atas, teks di bawah */
    }
    .news-thumb {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
    }
    .news-body {
      padding: 14px;
      background: var(--card, #0f2536);
    }
    .news-title {
      font-weight: 700;
      margin: 0 0 8px;
      font-size: 1.1rem;
      line-height: 1.4;
    }
    .excerpt {
      color: var(--muted, #a6c3d9);
      font-size: 0.95rem;
      line-height: 1.5;
      margin-bottom: 10px;
    }
    .news-meta {
      color: var(--muted, #9ca3af);
      font-size: 0.85rem;
    }
    .news-link {
      display: inline-block;
      margin-top: 12px;
      font-weight: 600;
      color: var(--accent, #64b5f6);
    }
    .news-link:hover { text-decoration: underline; }

    /* Grid berita responsif */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .news-thumb { height: 140px; }
      .news-title { font-size: 1rem; }
      .excerpt { font-size: 0.9rem; }
    }
  </style>
  <script src="data-layer.js"></script>
</head>
<body>
  <!-- Header -->
  <header class="header overlay">
    <div class="container" style="display:flex;align-items:center;gap:12px">
      <a class="brand" href="index.html">
        <img src="assets/logo.jpeg" alt="Logo PSTI Jatim"><span>PSTI JATIM</span>
      </a>
      <nav class="nav" style="margin-left:auto">
        <a class="btn btn-small btn-ghost" href="index.html">← Kembali</a>
      </nav>
    </div>
  </header>

  <!-- Konten -->
  <main class="container" style="max-width:1100px;margin:22px auto">
    <h1 style="margin:10px 0 14px">Berita Terbaru</h1>

    <div id="grid" class="cards-grid"></div>
    <div id="msg" class="muted" style="margin-top:10px"></div>
  </main>

  <script>
  (function(){
    const API = 'berita_api.php';
    const grid = document.getElementById('grid');
    const msg = document.getElementById('msg');

    function fmtDate(s){
      if(!s) return '';
      try{
        return new Date(s.replace(' ','T'))
          .toLocaleString('id-ID',{ day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
      }catch(_){ return s; }
    }

    function card(it){
      const div = document.createElement('div');
      div.className = 'news-card'; // <--- fix: hanya news-card
      div.innerHTML = `
        <img class="news-thumb" src="${it.banner||'assets/contoh.jpg'}" alt="">
        <div class="news-body">
          <div class="news-title">${it.title||'(Tanpa judul)'}</div>
          <div class="excerpt">${it.excerpt ? it.excerpt.substring(0,200)+'...' : ''}</div>
          <div class="news-meta">
            ${(it.source_name||'')}
            ${it.pinned? ' • <span style="color:#9be598;font-weight:700">Pinned</span>' : ''}
            ${it.published_at? ' • '+fmtDate(it.published_at) : ''}
          </div>
          ${
            it.source_url
              ? `<a class="btn btn-small news-link" target="_blank" href="${it.source_url}">Baca Selengkapnya ↗</a>`
              : `<a class="btn btn-small news-link" href="berita_detail.html?id=${it.id}">Baca Selengkapnya →</a>`
          }
        </div>`;
      return div;
    }

    async function load(){
      let url = API+'?action=list';
      grid.innerHTML = '';
      msg.textContent = 'Memuat…';
      try{
        const r = await fetch(url);
        const t = await r.text();
        let j; try{ j = JSON.parse(t); }catch(_){ throw new Error('Response bukan JSON: '+t.slice(0,200)); }
        if(!j.ok) throw new Error(j.error||'Gagal memuat');
        const items = j.items || [];
        if(!items.length){
          msg.textContent = 'Belum ada berita.';
          return;
        }
        msg.textContent = '';
        items.forEach(it => grid.appendChild(card(it)));
      }catch(e){
        console.error(e);
        msg.style.color = '#ffb3b3';
        msg.textContent = 'Gagal memuat: '+e.message;
      }
    }

    load();
  })();
  </script>
</body>
</html>
